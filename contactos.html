<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css"> 
    <link rel="stylesheet" href="css/index.css">
    <title>Inicio | Contactos</title>
</head>
<body>
    <header>
        <nav class="nav-bar">
            <div class="logo"> 
                <h1>La maría</h1>
            </div>
            <ul class="nav-list">
                <li class="items"><a href="index.html">Home</a></li>
                <li class="items"><a href="nosotros.html">Nosotros</a></li>
                <li class="items"><a href="productos.html">Servicios</a></li>
                <li class="items"><a href="contactos.html">Contacto</a></li>
                <li><a href="#" class="cta-button">Cotizar Ahora</a></li>
            </ul>
        </nav>
    </header>

    <section class="contacto">
    <div class="container-contacto">
        <p class="contacto-subtitle">ESTAMOS PARA AYUDARTE</p>
        <h1 class="contacto-title">
        Hablemos de tu logística
        </h1>
        <p class="contacto-text">
        Nuestro equipo está listo para brindarte soluciones eficientes, seguras y a la medida de tu operación.
        </p>
    </div>
    </section>

    <!-- CONTACTOS -->
    <section class="contacto-formulario">
    <div class="container">
        
        <form class="contacto-form">
        <h2 class="contacto-title">Contáctanos</h2>
        <div class="form-grid">
            <div class="form-group">
            <label>Nombre*</label>
            <input type="text" required>
            </div>

            <div class="form-group">
            <label>Apellido*</label>
            <input type="text" required>
            </div>

            <div class="form-group">
            <label>Email*</label>
            <input type="email" required>
            </div>

            <div class="form-group">
            <label>Teléfono*</label>
            <input type="text" required>
            </div>

            <div class="form-group">
            <label>Empresa*</label>
            <input type="text" required>
            </div>
        </div>

        <button type="submit" class="btn-contacto">
            Enviar
        </button>
        </form>
    </div>
    </section>
</body>
</html>
